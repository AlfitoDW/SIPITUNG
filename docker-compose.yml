services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel-react-app
    ports:
      - "8000:8000"
      - "5173:5173"
    volumes:
      - .:/var/www
      - /var/www/node_modules
      - /var/www/vendor
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
    networks:
      - laravel-network

networks:
  laravel-network:
    driver: bridge