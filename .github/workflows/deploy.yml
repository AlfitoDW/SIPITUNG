name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            set -e
            cd /var/www/sipitung/SIPITUNG
            trap 'php artisan up; echo "Deploy GAGAL — server dikembalikan ke online"' ERR
            php artisan down --refresh=15
            git pull origin main
            composer install --no-dev --optimize-autoloader
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            npm ci
            npm run build
            php artisan optimize:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan migrate --force
            php artisan up
            tmux send-keys -t sipitung:0 C-c ENTER
            tmux send-keys -t sipitung:0 'php artisan serve --host=0.0.0.0 --port=8000' ENTER
            echo "Deploy berhasil"