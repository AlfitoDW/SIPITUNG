<svg width="512" height="512" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="blueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#0099ff;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#0066cc;stop-opacity:1" />
        </linearGradient>
        <filter id="glow">
            <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>
    
    <!-- Hexagon -->
    <polygon points="200,60 290,110 290,210 200,260 110,210 110,110" 
             fill="url(#blueGrad)" 
             stroke="#0099ff" 
             stroke-width="4"
             filter="url(#glow)"/>
    
    <!-- Inner Hexagon -->
    <polygon points="200,80 270,120 270,200 200,240 130,200 130,120" 
             fill="none" 
             stroke="#00ccff" 
             stroke-width="2"
             opacity="0.7"/>
    
    <!-- Tech Lines -->
    <line x1="200" y1="150" x2="200" y2="110" stroke="#00ccff" stroke-width="3"/>
    <line x1="243.3" y1="175" x2="272.2" y2="160" stroke="#00ccff" stroke-width="3"/>
    <line x1="243.3" y1="235" x2="272.2" y2="250" stroke="#00ccff" stroke-width="3"/>
    <line x1="200" y1="260" x2="200" y2="300" stroke="#00ccff" stroke-width="3"/>
    <line x1="156.7" y1="235" x2="127.8" y2="250" stroke="#00ccff" stroke-width="3"/>
    <line x1="156.7" y1="175" x2="127.8" y2="160" stroke="#00ccff" stroke-width="3"/>
    
    <!-- Central Circle -->
    <circle cx="200" cy="205" r="50" fill="white" stroke="#0099ff" stroke-width="3"/>
    <circle cx="200" cy="205" r="40" fill="#0066cc"/>
    
    <!-- PK Text -->
    <text x="200" y="225" font-family="Arial, sans-serif" font-size="45" font-weight="bold" 
          fill="white" text-anchor="middle">PK</text>
    
    <!-- LLDIKTI 3 Badge -->
    <rect x="120" y="320" width="160" height="40" rx="8" fill="#0066cc" stroke="#0099ff" stroke-width="2"/>
    <text x="200" y="348" font-family="Arial, sans-serif" font-size="28" font-weight="bold" 
          fill="white" text-anchor="middle">LLDIKTI 3</text>
    
    <!-- Corner Accents -->
    <path d="M 50 50 L 70 50 M 50 50 L 50 70" stroke="#00ccff" stroke-width="3" stroke-linecap="round"/>
    <path d="M 350 50 L 330 50 M 350 50 L 350 70" stroke="#00ccff" stroke-width="3" stroke-linecap="round"/>
    <path d="M 50 350 L 70 350 M 50 350 L 50 330" stroke="#00ccff" stroke-width="3" stroke-linecap="round"/>
    <path d="M 350 350 L 330 350 M 350 350 L 350 330" stroke="#00ccff" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Hexagon Corner Dots -->
    <circle cx="200" cy="60" r="4" fill="#00ccff"/>
    <circle cx="290" cy="110" r="4" fill="#00ccff"/>
    <circle cx="290" cy="210" r="4" fill="#00ccff"/>
    <circle cx="200" cy="260" r="4" fill="#00ccff"/>
    <circle cx="110" cy="210" r="4" fill="#00ccff"/>
    <circle cx="110" cy="110" r="4" fill="#00ccff"/>
</svg>